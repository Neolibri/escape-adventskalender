<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e1116">
  <title>Escape-Adventskalender</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Adventskalender">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <div class="header">
      <!-- COVER: Sobald du dein Cover hast, lade die Bilddatei (z.B. cover.jpg)
           ins Repository und ersetze den Text-Platzhalter durch ein Bild:
           <div class="cover"><img src="cover.jpg" alt="Cover"></div>
      -->
      <div class="cover cover--schild" id="cover"><img src="schild.png" alt="Escape Room Adventskalender"></div>
      <h1 id="titel">Escape-Adventskalender</h1>
      <p id="untertitel">24 Türchen voller Rätsel</p>
      <p class="unlock-hint">🔒 Jedes Türchen öffnet sich erst am jeweiligen Tag im Dezember.</p>
    </div>

    <div class="install-tip" id="installTip">
      <span class="close" onclick="document.getElementById('installTip').classList.remove('show')">✕</span>
      <b>Tipp:</b> Über das Browser-Menü „Zum Startbildschirm hinzufügen“ kannst du diesen Kalender wie eine App speichern.
    </div>

    <!-- Hier wird per JavaScript entweder die Übersicht oder ein Tag gerendert -->
    <div id="view"></div>

    <div class="footer" id="footer"></div>
  </div>

  <script src="config.js"></script>
  <script src="inhalte.js"></script>
  <script src="app.js"></script>
</body>
</html>
