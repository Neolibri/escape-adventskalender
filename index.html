<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e1116">
  <title>Escape-Adventskalender</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Adventskalender">

           <div class="cover"><img src="icons/cover.jpg" alt="Cover"></div>
      -->
      <div class="cover" id="cover">Cover folgt – hier kommt dein Buch-Cover hin</div>
      <h1 id="titel">Escape-Adventskalender</h1>

    <div class="install-tip" id="installTip">

    <!-- Hier wird per JavaScript entweder die Übersicht oder ein Tag gerendert -->
    <div id="view"></div>

    <div class="footer" id="footer"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/inhalte.js"></script>
